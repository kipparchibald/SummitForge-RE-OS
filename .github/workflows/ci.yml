name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # CI builds run in demo mode: no real Supabase/Navica/OpenAI secrets needed,
      # and validate-env passes with fallbacks.
      NEXT_PUBLIC_DEMO_MODE: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build first: it generates next-env.d.ts and .next/types/*, which the
      # typecheck needs (they're gitignored, per Next.js 15.5 convention).
      - name: Build
        run: npm run build

      - name: Typecheck
        run: npx tsc --noEmit
